name: Build & Deploy Launcher

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'
  pull_request:

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  build:
    name: Build (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cmd: build:linux
            artifact_name: build-linux
          - os: windows-latest
            cmd: build:win
            artifact_name: build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Set NODE_ENV to production
        shell: bash
        run: sed -i 's/NODE_ENV=development/NODE_ENV=production/' .env

      - name: Build
        run: pnpm run ${{ matrix.cmd }}

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.AppImage
            release/*.rpm
            release/*.deb
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 1 || 7 }}

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*.exe
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 1 || 7 }}

  release:
    name: Create GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dying_star_launcher-${{ steps.version.outputs.version }}-windows.exe
            artifacts/dying_star_launcher-${{ steps.version.outputs.version }}-linux.AppImage
            artifacts/dying_star_launcher-${{ steps.version.outputs.version }}-linux.rpm
            artifacts/dying_star_launcher-${{ steps.version.outputs.version }}-linux.deb
